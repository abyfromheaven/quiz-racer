<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quiz Racer</title>
  </head>
  <body class="bg-slate-900 text-white overflow-hidden h-screen flex flex-col m-0 p-0 font-sans">
    
    <!-- MAIN MENU OVERLAY -->
    <div id="main-menu" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-6">
      <h1 class="text-6xl font-black mb-2 italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">QUIZ RACER</h1>
      <p class="text-slate-400 mb-12 tracking-widest uppercase">Pilih Mode Permainan</p>
      
      <div class="grid gap-6 w-full max-w-md">
        <button id="mode-solo" class="bg-blue-600 hover:bg-blue-500 py-6 px-8 rounded-2xl text-2xl font-bold shadow-[0_8px_0_rgb(29,78,216)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center">
          <span>SINGLE PLAYER</span>
          <span class="text-sm font-normal opacity-70">Lawan Bot Komputer</span>
        </button>
        
        <button id="mode-multi" class="bg-purple-600 hover:bg-purple-500 py-6 px-8 rounded-2xl text-2xl font-bold shadow-[0_8px_0_rgb(126,34,206)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center">
          <span>MULTIPLAYER</span>
          <span class="text-sm font-normal opacity-70">Lawan Teman (1 HP)</span>
        </button>
      </div>
    </div>

    <!-- GAME OVER OVERLAY -->
    <div id="game-over" class="hidden fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-[110] text-center p-6">
      <h1 id="result-title" class="text-5xl font-black mb-4 italic">KAMU MENANG!</h1>
      <p id="result-stats" class="text-slate-300 mb-8"></p>
      <button id="restart-btn" class="bg-white text-black px-12 py-4 rounded-full font-bold text-2xl hover:bg-slate-200 active:scale-95 transition-transform">MAIN LAGI</button>
    </div>

    <!-- GAME VIEWPORT (EXCALIBUR) -->
    <div id="game-container" class="h-[40%] w-full bg-black relative border-b-4 border-slate-700">
      <canvas id="game"></canvas>
    </div>

    <!-- UI AREA (Dinamis berdasarkan mode) -->
    <div id="ui-container" class="h-[60%] w-full flex flex-col md:flex-row">
      
      <!-- Player 1 UI -->
      <div id="p1-ui" class="flex-1 bg-slate-800 p-4 flex flex-col border-r-2 border-slate-700">
        <div class="flex justify-between items-center mb-2">
          <span id="p1-label" class="bg-blue-600 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Player 1</span>
          <span class="text-xs text-slate-400">Skor: <span id="p1-score" class="text-white">0</span></span>
        </div>
        <div class="flex-grow flex items-center justify-center text-center p-2">
          <h2 id="p1-question" class="text-lg font-bold leading-tight">Memuat pertanyaan...</h2>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-2">
          <button class="p1-opt bg-slate-700 active:bg-blue-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="0">A</button>
          <button class="p1-opt bg-slate-700 active:bg-blue-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="1">B</button>
          <button class="p1-opt bg-slate-700 active:bg-blue-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="2">C</button>
          <button class="p1-opt bg-slate-700 active:bg-blue-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="3">D</button>
        </div>
      </div>

      <!-- Player 2 UI (Hanya muncul di multiplayer) -->
      <div id="p2-ui" class="hidden flex-1 bg-slate-900 p-4 flex flex-col">
        <div class="flex justify-between items-center mb-2">
          <span class="bg-purple-600 text-[10px] px-2 py-0.5 rounded font-bold uppercase">Player 2</span>
          <span class="text-xs text-slate-400">Skor: <span id="p2-score" class="text-white">0</span></span>
        </div>
        <div class="flex-grow flex items-center justify-center text-center p-2">
          <h2 id="p2-question" class="text-lg font-bold leading-tight">Memuat pertanyaan...</h2>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-2">
          <button class="p2-opt bg-slate-700 active:bg-purple-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="0">A</button>
          <button class="p2-opt bg-slate-700 active:bg-purple-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="1">B</button>
          <button class="p2-opt bg-slate-700 active:bg-purple-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="2">C</button>
          <button class="p2-opt bg-slate-700 active:bg-purple-600 py-3 rounded-lg text-sm font-semibold transition-colors border-b-4 border-slate-900" data-index="3">D</button>
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
